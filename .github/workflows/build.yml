name: Build PlugManX

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Install parent POM so module builds can resolve it
      - name: Install parent POM
        run: mvn -B install -N

      # Generate the ca.bkaw:paper-nms dependency into the local Maven repo.
      # This artifact is not published to any remote repo; it must be produced
      # locally via the paper-nms-maven-plugin before the reactor build runs.
      - name: Initialize paper-nms
        working-directory: plugman-paper
        run: mvn -B paper-nms:init

      - name: Build with Maven
        run: mvn -B clean package

      - name: Upload built jars
        uses: actions/upload-artifact@v4
        with:
          name: PlugManX-jars
          path: |
            **/target/*.jar
            !**/target/original-*.jar
          if-no-files-found: error
