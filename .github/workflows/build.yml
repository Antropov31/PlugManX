name: Build PlugManX

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Install parent POM so module builds can resolve it
      - name: Install parent POM
        run: mvn -B install -N

      # Generate the ca.bkaw:paper-nms dependency into the local Maven repo.
      # This artifact is not published anywhere; it must be produced locally
      # via the paper-nms-maven-plugin before the reactor build runs.
      - name: Initialize paper-nms
        working-directory: plugman-paper
        run: mvn -B paper-nms:init

      - name: Build with Maven
        run: mvn -B clean package

      # Find the single final jar from the assembly module and give it a clean name.
      - name: Locate final jar
        id: jar
        run: |
          FILE=$(ls plugman-assembly/target/*.jar | grep -v 'original-' | head -n 1)
          echo "Found: $FILE"
          cp "$FILE" PlugManX-Purpur26.2-Antropov31.jar
          echo "path=PlugManX-Purpur26.2-Antropov31.jar" >> "$GITHUB_OUTPUT"

      # Publish that one jar to a Release. The 'latest' tag is force-updated each build.
      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: PlugManX (Purpur 26.2 Fix)
          body: |
            Fork of PlugManX by Antropov31 with the Purpur 26.2 NumberFormatException fix.
            Just download the jar below and drop it into your server's plugins folder.
          files: ${{ steps.jar.outputs.path }}
          make_latest: true
